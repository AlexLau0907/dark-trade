<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>body{margin:0;height:100vh;display:flex;flex-direction:column;}
#c{flex:1;}</style></head><body>
<div id="c"></div>
<script>
const data=[
  {time:'2026-05-11',open:100,high:105,low:98,close:102},
  {time:'2026-05-12',open:102,high:108,low:101,close:107},
  {time:'2026-05-13',open:107,high:110,low:105,close:108},
];
const el=document.getElementById('c');
const ch=LightweightCharts.createChart(el,{width:el.clientWidth,height:el.clientHeight});
const cs=ch.addCandlestickSeries({upColor:'#e63946',downColor:'#2196F3',borderUpColor:'#e63946',borderDownColor:'#2196F3',wickUpColor:'#e63946',wickDownColor:'#2196F3'});
cs.setData(data);
const vs=ch.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:''});
vs.setData([{time:'2026-05-11',value:1000,color:'rgba(232,93,4,0.5)'},{time:'2026-05-12',value:2000,color:'rgba(232,93,4,0.5)'},{time:'2026-05-13',value:1500,color:'rgba(33,150,243,0.5)'}]);
ch.priceScale('').applyOptions({scaleMargins:{top:0.8,bottom:0}});
cs.priceScale().applyOptions({scaleMargins:{top:0.1,bottom:0.35}});
</script></body></html>
